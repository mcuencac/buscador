<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscador de Películas</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Fascinate&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header container">
    <h1>Buscador OMDb</h1>
    <h3>The Open Movie Database</h3>
  </header>

  <main class="container">
    <form id="searchForm" class="search">
      <input id="query" type="text" placeholder="Busca por título (ej. Batman)..." required />
      
      <button type="submit" class="btn btn-primary">Buscar</button>
      <button type="button" id="clearBtn" class="btn">Restablecer</button>
      <select id="genreFilter">
        <option value="all">Todos los géneros</option>
      </select>
    </form>

    <p id="status" class="status"></p>

    <section id="results" class="grid"></section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
